<footer class="site-footer">
  <div class="wrapper footer-grid">
    <div>
      <h2 class="footer-heading">{{ site.title }}</h2>
      <p>{{ site.description }}</p>
    </div>
    <div>
      <ul class="contact-list">
        <li><a href="mailto:{{ site.email }}">{{ site.email }}</a></li>
        {% if site.github_username %}
        <li><a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer">GitHub</a></li>
        {% endif %}
        {% if site.twitter_username %}
        <li><a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noopener noreferrer">Twitter</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</footer>
